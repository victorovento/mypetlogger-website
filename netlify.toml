[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=(), geolocation=(), camera=(), microphone=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/privacy"
  to = "/privacy/"
  status = 301

[[redirects]]
  from = "/terms"
  to = "/terms/"
  status = 301

[[redirects]]
  from = "/support"
  to = "/support/"
  status = 301

[[redirects]]
  from = "/es"
  to = "/es-la/"
  status = 301
